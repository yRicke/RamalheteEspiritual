{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ramalhete Espiritual{% endblock %}</title>
    <link rel="icon" type="image/webp" href="{% static 'app/images/brand-sacred-heart.webp' %}">
    <link rel="stylesheet" href="{% static 'app/css/styles.css' %}">
</head>
<body class="{% block body_class %}{% endblock %}">
    <div class="page-shell">
        {% include 'blocos/navbar.html' %}
        <main class="main">
            {% block content %}{% endblock %}
        </main>
        {% include 'blocos/footer.html' %}
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
