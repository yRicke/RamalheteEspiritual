{% load static %}
<header class="site-header">
    <nav class="nav" aria-label="Navegacao principal">
        <a class="brand" href="{% url 'home' %}">
            <span class="brand-mark" aria-hidden="true">
                <img src="{% static 'app/images/brand-sacred-heart.webp' %}" alt="" width="640" height="640">
            </span>
            <span class="brand-name">Ramalhete Espiritual</span>
        </a>

        <div class="nav-actions">
            <a class="nav-link" href="{% url 'home' %}">
                {% if user.is_superuser %}Painel{% else %}Calendario{% endif %}
            </a>
            {% if user.is_authenticated %}
                <span class="nav-link">{{ user.username }}</span>
                <a class="button secondary" href="{% url 'sair' %}">Sair</a>
            {% else %}
                <a class="nav-link" href="{% url 'entrar' %}">Entrar</a>
            {% endif %}
        </div>
    </nav>
</header>
